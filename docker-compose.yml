# «Нейро-шеф Гурмикс» — один web-сервис (FastAPI + собранный React SPA + Claude CLI).
# Порт настраивается переменной APP_PORT в .env (дефолт 8420 — нестандартный,
# т.к. на проде много чего занято). Меняешь APP_PORT — меняется и host, и контейнер.
services:
  web:
    build: .
    env_file:
      - .env
    environment:
      APP_PORT: ${APP_PORT:-8420}
    ports:
      - "${APP_PORT:-8420}:${APP_PORT:-8420}"
    volumes:
      - ./base:/app/backend/base   # база знаний: SQLite (+ эмбеддинги/индекс в фазе 2)
      - ./data:/app/backend/data   # shared с ArkadiyJarvis: .claude_token.json (симлинк на проде)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -fsS http://localhost:${APP_PORT:-8420}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
